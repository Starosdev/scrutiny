components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Master API token or JWT session token.
    MetricsBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: Dedicated metrics bearer token from `web.metrics.token`.
  parameters:
    DeviceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Device identifier. The backend resolves a device by `device_id`, WWN, or other accepted lookup key.
    NumericId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Guid:
      name: guid
      in: path
      required: true
      schema:
        type: string
    Uuid:
      name: uuid
      in: path
      required: true
      schema:
        type: string
    DurationKey:
      name: duration_key
      in: query
      schema:
        type: string
        default: week
      description: Repository-defined duration key such as `day`, `week`, `month`, `year`, or `forever`, depending on the route.
  responses:
    SuccessResponse:
      description: Generic success response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessResponse"
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string
        errors:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                additionalProperties: true
      required: [success]
    AuthStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        auth_enabled:
          type: boolean
        login_methods:
          type: array
          items:
            type: string
      required: [success, auth_enabled]
    AuthDisabledResponse:
      type: object
      properties:
        success:
          type: boolean
        auth_enabled:
          type: boolean
        message:
          type: string
      required: [success, auth_enabled, message]
    LoginRequest:
      type: object
      properties:
        token:
          type: string
        username:
          type: string
        password:
          type: string
      description: Provide either `token` or `username` plus `password`.
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        token_type:
          type: string
      required: [success, token, expires_at, token_type]
    HealthCheckStatus:
      type: object
      properties:
        status:
          type: string
        latency_ms:
          type: integer
        error:
          type: string
    HealthResponse:
      type: object
      properties:
        success:
          type: boolean
        status:
          type: string
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/HealthCheckStatus"
      required: [success, status, checks]
    Device:
      type: object
      properties:
        device_id:
          type: string
        wwn:
          type: string
        device_name:
          type: string
        model_name:
          type: string
        serial_number:
          type: string
        device_protocol:
          type: string
        host_id:
          type: string
        label:
          type: string
        archived:
          type: boolean
        muted:
          type: boolean
        smart_display_mode:
          type: string
        missed_ping_timeout_override:
          type: integer
        max_tbw:
          type: number
          format: double
        device_status:
          type: integer
        has_forced_failure:
          type: boolean
      additionalProperties: true
    DeviceWrapper:
      type: object
      properties:
        success:
          type: boolean
        errors:
          type: array
          items:
            type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/Device"
      required: [success, data]
    CollectorSmartInfo:
      type: object
      description: Collector SMART submission payload.
      properties:
        json_format_version:
          type: array
          items:
            type: integer
        smartctl:
          $ref: "#/components/schemas/SmartctlInfo"
        device:
          $ref: "#/components/schemas/CollectorDeviceInfo"
        model_name:
          type: string
        serial_number:
          type: string
        firmware_version:
          type: string
        wwn:
          type: object
          properties:
            naa:
              type: integer
              format: int64
            oui:
              type: integer
              format: int64
            id:
              type: integer
              format: int64
        user_capacity:
          $ref: "#/components/schemas/UserCapacity"
        logical_block_size:
          type: integer
        physical_block_size:
          type: integer
        rotation_rate:
          type: integer
        form_factor:
          type: object
          properties:
            ata_value:
              type: integer
            name:
              type: string
        smart_status:
          type: object
          properties:
            passed:
              type: boolean
        smart_support:
          type: object
          additionalProperties: true
        local_time:
          type: object
          properties:
            time_t:
              type: integer
              format: int64
            asctime:
              type: string
        power_on_time:
          type: object
          properties:
            hours:
              type: integer
              format: int64
        power_cycle_count:
          type: integer
          format: int64
        temperature:
          type: object
          properties:
            current:
              type: integer
              format: int64
        ata_smart_attributes:
          type: object
          properties:
            revision:
              type: integer
            table:
              type: array
              items:
                $ref: "#/components/schemas/AtaSmartAttributeTableItem"
        ata_device_statistics:
          $ref: "#/components/schemas/AtaDeviceStatistics"
        nvme_smart_health_information_log:
          $ref: "#/components/schemas/NvmeSmartHealthInformationLog"
        nvme_pci_vendor:
          type: object
          properties:
            id:
              type: integer
            subsystem_id:
              type: integer
        nvme_ieee_oui_identifier:
          type: integer
        nvme_total_capacity:
          type: integer
          format: int64
        nvme_controller_id:
          type: integer
        nvme_number_of_namespaces:
          type: integer
        nvme_namespaces:
          type: array
          items:
            $ref: "#/components/schemas/NvmeNamespace"
        vendor:
          type: string
        product:
          type: string
        scsi_version:
          type: string
        scsi_grown_defect_list:
          type: integer
          format: int64
        scsi_error_counter_log:
          $ref: "#/components/schemas/ScsiErrorCounterLog"
        scsi_environmental_reports:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ScsiTemperatureData"
        seagate_farm_log:
          $ref: "#/components/schemas/SeagateFarmLog"
      additionalProperties: true
    DeviceDetailsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            device:
              $ref: "#/components/schemas/Device"
            smart_results:
              type: array
              items:
                $ref: "#/components/schemas/SmartMeasurement"
        metadata:
          type: object
          additionalProperties: true
      required: [success, data]
    DeviceSelfTest:
      type: object
      properties:
        id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
        device_id:
          type: string
        device_wwn:
          type: string
        type_value:
          type: integer
        type_string:
          type: string
        status_value:
          type: integer
        status_string:
          type: string
        status_passed:
          type: boolean
        lifetime_hours:
          type: integer
      required:
        - id
        - device_id
        - device_wwn
        - type_value
        - type_string
        - status_value
        - status_string
        - status_passed
        - lifetime_hours
    DeviceSelfTestsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            self_tests:
              type: array
              items:
                $ref: "#/components/schemas/DeviceSelfTest"
          required: [self_tests]
      required: [success, data]
    PerformanceUploadRequest:
      type: object
      properties:
        profile:
          type: string
        device_protocol:
          type: string
        fio_version:
          type: string
        date:
          type: integer
        seq_read_bw_bytes:
          type: number
        seq_write_bw_bytes:
          type: number
        rand_read_iops:
          type: number
        rand_write_iops:
          type: number
        rand_read_lat_ns_avg:
          type: number
        rand_read_lat_ns_p50:
          type: number
        rand_read_lat_ns_p95:
          type: number
        rand_read_lat_ns_p99:
          type: number
        rand_write_lat_ns_avg:
          type: number
        rand_write_lat_ns_p50:
          type: number
        rand_write_lat_ns_p95:
          type: number
        rand_write_lat_ns_p99:
          type: number
        mixed_rw_iops:
          type: number
        test_duration_sec:
          type: number
    PerformanceUploadResponse:
      type: object
      properties:
        success:
          type: boolean
        degradation:
          type: object
          additionalProperties: true
    PerformanceHistoryResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            history:
              type: array
              items:
                $ref: "#/components/schemas/PerformanceMeasurement"
            baseline:
              $ref: "#/components/schemas/PerformanceBaseline"
    CollectorErrorRequest:
      type: object
      properties:
        error_type:
          type: string
          description: One of `scan`, `info`, or `xall`.
        error_message:
          type: string
        device_name:
          type: string
      required: [error_type, error_message]
    Settings:
      type: object
      properties:
        theme:
          type: string
        layout:
          type: string
        dashboard_display:
          type: string
        dashboard_sort:
          type: string
        temperature_unit:
          type: string
        line_stroke:
          type: string
        powered_on_hours_unit:
          type: string
        time_format:
          type: string
        file_size_si_units:
          type: boolean
        collector:
          type: object
          properties:
            retrieve_sct_temperature_history:
              type: boolean
        metrics:
          type: object
          properties:
            notify_level:
              type: integer
            status_filter_attributes:
              type: integer
            status_threshold:
              type: integer
            repeat_notifications:
              type: boolean
            notify_on_collector_error:
              type: boolean
            notify_on_missed_ping:
              type: boolean
            notify_on_replacement_risk:
              type: boolean
            replacement_risk_notify_category:
              type: string
            consumer_drive_profiles_enabled:
              type: boolean
              description: Enable vetted ATA consumer drive model or family overrides for SMART status evaluation and replacement-risk scoring. When false, all ATA devices use generic ATA rules.
            notification_rate_limit:
              type: integer
            notification_quiet_start:
              type: string
            notification_quiet_end:
              type: string
            missed_ping_timeout_minutes:
              type: integer
            missed_ping_check_interval_mins:
              type: integer
            missed_ping_cooldown_minutes:
              type: integer
            heartbeat_enabled:
              type: boolean
            heartbeat_interval_hours:
              type: integer
            uptime_kuma_enabled:
              type: boolean
            uptime_kuma_push_url:
              type: string
            uptime_kuma_interval_seconds:
              type: integer
            report_enabled:
              type: boolean
            report_daily_enabled:
              type: boolean
            report_daily_time:
              type: string
            report_weekly_enabled:
              type: boolean
            report_weekly_day:
              type: integer
            report_weekly_time:
              type: string
            report_monthly_enabled:
              type: boolean
            report_monthly_day:
              type: integer
            report_monthly_time:
              type: string
            report_pdf_enabled:
              type: boolean
            report_pdf_path:
              type: string
    SettingsResponse:
      type: object
      properties:
        success:
          type: boolean
        settings:
          $ref: "#/components/schemas/Settings"
        server_version:
          type: string
        collector_trigger_enabled:
          type: boolean
    SaveSettingsResponse:
      type: object
      properties:
        success:
          type: boolean
        settings:
          $ref: "#/components/schemas/Settings"
    AttributeOverride:
      type: object
      properties:
        id:
          type: integer
        protocol:
          type: string
          enum: [ATA, NVMe, SCSI]
        attribute_id:
          type: string
        wwn:
          type: string
        action:
          type: string
          enum: ["", ignore, force_status]
        status:
          type: string
          enum: [passed, warn, failed]
        warn_above:
          type: integer
          format: int64
        fail_above:
          type: integer
          format: int64
        source:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    NotifyUrl:
      type: object
      description: Notification target stored by Scrutiny. URLs may use existing Shoutrrr syntax, an explicit Apprise target prefixed with apprise+, script://, or raw http(s) webhooks.
      properties:
        id:
          type: integer
        url:
          type: string
        label:
          type: string
        source:
          type: string
      required: [url, source]
    GenerateReportResponse:
      type: object
      properties:
        success:
          type: boolean
        subject:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/ReportData"
        notification_sent:
          type: boolean
    ReportHistoryEntry:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        mod_time:
          type: string
          format: date-time
        size:
          type: integer
          format: int64
    ReportHistoryResponse:
      type: object
      properties:
        success:
          type: boolean
        reports:
          type: array
          items:
            $ref: "#/components/schemas/ReportHistoryEntry"
    FilesystemCapacity:
      type: object
      properties:
        host_id:
          type: string
        mount_point:
          type: string
        source_device:
          type: string
        filesystem_type:
          type: string
        total_bytes:
          type: integer
          format: int64
        used_bytes:
          type: integer
          format: int64
        available_bytes:
          type: integer
          format: int64
        used_percent:
          type: number
          format: double
      required: [host_id, mount_point]
    FilesystemHostStatus:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
        host_id:
          type: string
        status:
          type: string
          enum: [available, unavailable]
