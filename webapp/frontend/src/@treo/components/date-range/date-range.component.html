<div class="range" (click)="openPickerPanel()" #pickerPanelOrigin>
    <div class="start">
        <div class="date">{{ range.startDate }}</div>
        @if (range.startTime) {
        <div class="time">{{ range.startTime }}</div>
        }
    </div>

    <div class="separator">-</div>

    <div class="end">
        <div class="date">{{ range.endDate }}</div>
        @if (range.endTime) {
        <div class="time">{{ range.endTime }}</div>
        }
    </div>
</div>

<ng-template #pickerPanel>
    <!-- Start -->
    <div class="start">
        <div class="month">
            <div class="month-header">
                <button class="previous-button" mat-icon-button (click)="prev()" tabindex="1">
                    <mat-icon [svgIcon]="'chevron_left'"></mat-icon>
                </button>
                <div class="month-label">{{ getMonthLabel(1) }}</div>
            </div>
            <mat-month-view
                [(activeDate)]="activeDates.month1"
                [dateFilter]="dateFilter()"
                [dateClass]="dateClass()"
                (click)="$event.stopImmediatePropagation()"
                (selectedChange)="onSelectedDateChange($event)"
                #matMonthView1
            >
            </mat-month-view>
        </div>

        @if (timeRange) {
        <mat-form-field class="treo-mat-no-subscript time start-time">
            <input matInput [autocomplete]="'off'" [formControl]="startTimeFormControl" (blur)="updateStartTime($event)" tabindex="3" />
            <mat-label>Start time</mat-label>
        </mat-form-field>
        }
    </div>

    <!-- End -->
    <div class="end">
        <div class="month">
            <div class="month-header">
                <div class="month-label">{{ getMonthLabel(2) }}</div>
                <button class="next-button" mat-icon-button (click)="next()" tabindex="2">
                    <mat-icon [svgIcon]="'chevron_right'"></mat-icon>
                </button>
            </div>
            <mat-month-view
                [(activeDate)]="activeDates.month2"
                [dateFilter]="dateFilter()"
                [dateClass]="dateClass()"
                (click)="$event.stopImmediatePropagation()"
                (selectedChange)="onSelectedDateChange($event)"
                #matMonthView2
            >
            </mat-month-view>
        </div>

        @if (timeRange) {
        <mat-form-field class="treo-mat-no-subscript time end-time">
            <input matInput [formControl]="endTimeFormControl" (blur)="updateEndTime($event)" tabindex="4" />
            <mat-label>End time</mat-label>
        </mat-form-field>
        }
    </div>
</ng-template>
