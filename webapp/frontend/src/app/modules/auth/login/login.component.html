<div class="login-container">
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
            <img src="assets/images/logo/scrutiny-logo-dark-text.png" class="logo-light" alt="Scrutiny">
            <img src="assets/images/logo/scrutiny-logo-white-text.png" class="logo-dark" alt="Scrutiny">
        </div>

        <h2 class="login-title">Sign in</h2>

        <!-- Loading bar -->
        @if (isLoading) {
            <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        }

        <!-- Error message -->
        @if (errorMessage) {
            <div class="login-error">
                <mat-icon>error_outline</mat-icon>
                <span>{{ errorMessage }}</span>
            </div>
        }

        <!-- Login tabs -->
        <mat-tab-group [selectedIndex]="0" animationDuration="200ms">
            <!-- Token tab -->
            <mat-tab label="Token">
                <form [formGroup]="tokenForm" (ngSubmit)="onTokenLogin()" class="login-form">
                    <mat-form-field appearance="outline" class="login-field">
                        <mat-label>API Token</mat-label>
                        <input matInput
                            formControlName="token"
                            [type]="hideToken ? 'password' : 'text'"
                            placeholder="Enter your API token"
                            autocomplete="off">
                        <button mat-icon-button matSuffix type="button"
                            (click)="hideToken = !hideToken">
                            <mat-icon>{{ hideToken ? 'visibility_off' : 'visibility' }}</mat-icon>
                        </button>
                    </mat-form-field>

                    <button mat-flat-button color="primary" type="submit"
                        class="login-button"
                        [disabled]="tokenForm.invalid || isLoading">
                        Sign in with Token
                    </button>
                </form>
            </mat-tab>

            <!-- Password tab (only if enabled) -->
            @if (showPasswordTab) {
                <mat-tab label="Password">
                    <form [formGroup]="passwordForm" (ngSubmit)="onPasswordLogin()" class="login-form">
                        <mat-form-field appearance="outline" class="login-field">
                            <mat-label>Username</mat-label>
                            <input matInput
                                formControlName="username"
                                type="text"
                                placeholder="Enter your username"
                                autocomplete="username">
                        </mat-form-field>

                        <mat-form-field appearance="outline" class="login-field">
                            <mat-label>Password</mat-label>
                            <input matInput
                                formControlName="password"
                                [type]="hidePassword ? 'password' : 'text'"
                                placeholder="Enter your password"
                                autocomplete="current-password">
                            <button mat-icon-button matSuffix type="button"
                                (click)="hidePassword = !hidePassword">
                                <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                            </button>
                        </mat-form-field>

                        <button mat-flat-button color="primary" type="submit"
                            class="login-button"
                            [disabled]="passwordForm.invalid || isLoading">
                            Sign in with Password
                        </button>
                    </form>
                </mat-tab>
            }
        </mat-tab-group>
    </div>
</div>
