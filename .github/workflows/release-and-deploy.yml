name: Automated Release and Deploy

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: release-and-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize image name
        id: image_name
        run: |
          set -euo pipefail
          echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:latest
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:latest-omnibus
          cache-from: type=gha,scope=production-omnibus
          cache-to: type=gha,mode=max,scope=production-omnibus

      - name: Install NetBird
        run: |
          set -euo pipefail
          curl -fsSL https://pkgs.netbird.io/install.sh | sh
          sudo netbird service install
          sudo netbird service start

      - name: Join NetBird network
        env:
          NETBIRD_SETUP_KEY: ${{ secrets.NETBIRD_SETUP_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NETBIRD_SETUP_KEY}" ]; then
            echo "NETBIRD_SETUP_KEY is required"
            exit 1
          fi
          sudo netbird up --setup-key "${NETBIRD_SETUP_KEY}"
          sudo netbird status

      - name: Deploy via SSH
        env:
          SCRUTINY_PRODUCTION_HOST: ${{ secrets.SCRUTINY_PRODUCTION_HOST }}
          SCRUTINY_PRODUCTION_USER: ${{ secrets.SCRUTINY_PRODUCTION_USER }}
          SCRUTINY_PRODUCTION_SSH_KEY: ${{ secrets.SCRUTINY_PRODUCTION_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SCRUTINY_PRODUCTION_HOST}" ] || [ -z "${SCRUTINY_PRODUCTION_USER}" ] || [ -z "${SCRUTINY_PRODUCTION_SSH_KEY}" ]; then
            echo "Missing one or more production deployment secrets"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$SCRUTINY_PRODUCTION_SSH_KEY" > ~/.ssh/scrutiny_production_key
          chmod 600 ~/.ssh/scrutiny_production_key
          ssh-keyscan -H "$SCRUTINY_PRODUCTION_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/scrutiny_production_key -o StrictHostKeyChecking=yes "${SCRUTINY_PRODUCTION_USER}@${SCRUTINY_PRODUCTION_HOST}" \
            "bash /mnt/user/appdata/scrutiny/repo/ops/deploy-production.sh"

      - name: Leave NetBird network
        if: always()
        run: |
          set -euo pipefail
          sudo netbird down || true
