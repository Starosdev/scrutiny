name: Project Router

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: read
  repository-projects: write

env:
  PROJECT_ID: "PVT_kwHOAhLuuc4BRxRe"
  STATUS_FIELD_ID: "PVTSSF_lAHOAhLuuc4BRxRezg_f_1E"
  # Status column option IDs
  TRIAGE_ID: "f38a7179"
  SECURITY_ID: "1e285fa8"
  HOTFIX_ID: "6fa8da28"
  BUG_BACKLOG_ID: "a1e615eb"
  BETA_SATURDAY_ID: "f0f297f5"

jobs:
  route-issue:
    name: Route Issue to Project
    runs-on: ubuntu-latest
    if: >-
      github.event.action == 'opened' ||
      (
        github.event.action == 'labeled' &&
        (
          github.event.label.name == 'bug' ||
          github.event.label.name == 'enhancement' ||
          github.event.label.name == 'hotfix' ||
          github.event.label.name == 'security' ||
          github.event.label.name == 'priority:urgent' ||
          github.event.label.name == 'priority:high'
        )
      )
    steps:
      - name: Determine target column
        id: target
        env:
          LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          echo "Labels: $LABELS"
          COLUMN_ID=""
          COLUMN_NAME=""

          HAS_BUG=$(echo "$LABELS" | jq 'any(. == "bug")')
          HAS_ENHANCEMENT=$(echo "$LABELS" | jq 'any(. == "enhancement")')
          HAS_HOTFIX=$(echo "$LABELS" | jq 'any(. == "hotfix")')
          HAS_SECURITY=$(echo "$LABELS" | jq 'any(. == "security")')
          HAS_URGENT=$(echo "$LABELS" | jq 'any(. == "priority:urgent")')
          HAS_HIGH=$(echo "$LABELS" | jq 'any(. == "priority:high")')

          # Priority overrides: urgent/high bugs or urgent security go to Hotfix
          if [ "$HAS_HOTFIX" = "true" ]; then
            COLUMN_ID="${{ env.HOTFIX_ID }}"
            COLUMN_NAME="Hotfix"
          elif [ "$HAS_SECURITY" = "true" ] && [ "$HAS_URGENT" = "true" ]; then
            COLUMN_ID="${{ env.HOTFIX_ID }}"
            COLUMN_NAME="Hotfix (urgent security)"
          elif [ "$HAS_BUG" = "true" ] && ([ "$HAS_URGENT" = "true" ] || [ "$HAS_HIGH" = "true" ]); then
            COLUMN_ID="${{ env.HOTFIX_ID }}"
            COLUMN_NAME="Hotfix (urgent/high bug)"
          elif [ "$HAS_SECURITY" = "true" ]; then
            COLUMN_ID="${{ env.SECURITY_ID }}"
            COLUMN_NAME="Security"
          elif [ "$HAS_BUG" = "true" ]; then
            COLUMN_ID="${{ env.BUG_BACKLOG_ID }}"
            COLUMN_NAME="Bug Backlog"
          elif [ "$HAS_ENHANCEMENT" = "true" ]; then
            COLUMN_ID="${{ env.BETA_SATURDAY_ID }}"
            COLUMN_NAME="Beta (Saturday)"
          else
            COLUMN_ID="${{ env.TRIAGE_ID }}"
            COLUMN_NAME="Triage"
          fi

          if [ -z "$COLUMN_ID" ] || [ -z "$COLUMN_NAME" ]; then
            echo "Failed to determine a target column" >&2
            exit 1
          fi

          echo "column_id=$COLUMN_ID" >> $GITHUB_OUTPUT
          echo "column_name=$COLUMN_NAME" >> $GITHUB_OUTPUT

      - name: Resolve or add issue project item
        id: item
        env:
          GITHUB_TOKEN: ${{ secrets.SCRUTINY_GITHUB_TOKEN }}
        run: |
          EXISTING_ITEM_ID=$(gh api graphql -f query='
            query($contentId: ID!) {
              node(id: $contentId) {
                ... on Issue {
                  projectItems(first: 100) {
                    nodes {
                      id
                      project {
                        id
                      }
                    }
                  }
                }
              }
            }' \
            -f contentId="${{ github.event.issue.node_id }}" \
            --jq '.data.node.projectItems.nodes[]? | select(.project.id == "'"${{ env.PROJECT_ID }}"'") | .id' | head -n 1)

          ITEM_ID="$EXISTING_ITEM_ID"
          if [ -n "$ITEM_ID" ]; then
            echo "Issue #${{ github.event.issue.number }} is already in the project (item: $ITEM_ID)"
          else
            ITEM_ID=$(gh api graphql -f query='
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {
                  projectId: $projectId
                  contentId: $contentId
                }) {
                  item {
                    id
                  }
                }
              }' \
              -f projectId="${{ env.PROJECT_ID }}" \
              -f contentId="${{ github.event.issue.node_id }}" \
              --jq '.data.addProjectV2ItemById.item.id')
            echo "Added issue #${{ github.event.issue.number }} to project (item: $ITEM_ID)"
          fi

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "Failed to resolve a project item id for issue #${{ github.event.issue.number }}" >&2
            exit 1
          fi

          echo "item_id=$ITEM_ID" >> $GITHUB_OUTPUT

      - name: Set status column
        env:
          GITHUB_TOKEN: ${{ secrets.SCRUTINY_GITHUB_TOKEN }}
        run: |
          if [ -z "${{ steps.item.outputs.item_id }}" ]; then
            echo "Project item id is empty; refusing to update status" >&2
            exit 1
          fi

          if [ -z "${{ steps.target.outputs.column_id }}" ]; then
            echo "Target status option id is empty; refusing to update status" >&2
            exit 1
          fi

          gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) {
                projectV2Item {
                  id
                }
              }
            }' \
            -f projectId="${{ env.PROJECT_ID }}" \
            -f itemId="${{ steps.item.outputs.item_id }}" \
            -f fieldId="${{ env.STATUS_FIELD_ID }}" \
            -f optionId="${{ steps.target.outputs.column_id }}"

          echo "Routed issue #${{ github.event.issue.number }} to: ${{ steps.target.outputs.column_name }}"
